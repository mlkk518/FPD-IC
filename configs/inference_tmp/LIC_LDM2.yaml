
alpha: &alpha 1  #  0~1   越接近1  越保真

model:
  cldm:
    target: diffbir.model.cldm.ControlLDM
    params:
      latent_scale_factor: 0.18215
      unet_cfg:
        use_checkpoint: True
        image_size: 32 # unused
        in_channels: 4
        out_channels: 4
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_head_channels: 64 # need to fix for flash-attn
        use_spatial_transformer: True
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        legacy: False
      vae_cfg:
        embed_dim: 4
        ddconfig:
          double_z: true
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          - 4
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
          Adaptor_Flag: True
          alpha: *alpha #0.2 #1.0
      clip_cfg:
        embed_dim: 1024
        vision_cfg:
          image_size: 224
          layers: 32
          width: 1280
          head_width: 80
          patch_size: 14
        text_cfg:
          context_length: 77
          vocab_size: 49408
          width: 1024
          heads: 16
          layers: 24
        layer: "penultimate"
      controlnet_cfg:
        use_checkpoint: True
        image_size: 32 # unused
        in_channels: 4
        hint_channels: 4
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_head_channels: 64 # need to fix for flash-attn
        use_spatial_transformer: True
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        legacy: False

  diffusion:
    target: diffbir.model.gaussian_diffusion.Diffusion
    params:
      linear_start: 0.00085
      linear_end: 0.0120
      timesteps: 1000
      zero_snr: True #False
      parameterization: v #eps

dataset:
  test:
    target: diffbir.dataset.codeformer.CodeformerDataset
    params:
#      file_gt: /usr/mlkkIC/Natura_datasets/Test_imgs/Test_datasets/kodak  #Test_imgs/Test_datasets/kodak
#      file_lq: /media/xjtu-ei/Disk_8T/LJH/LIC/LIC_TCM-main/results_test/kodak_0.0005        #kodak_LIC_TCM_0.0025

      file_gt: /media/xjtu-ei/Disk_8T/LJH/Datasets/Natura_datasets/Test_imgs/DiffEIC_TestImgs/kodak #kodak  #Tecnick
      file_lq: /media/xjtu-ei/Disk_8T/LJH/LIC/LIC_TCM-main/results_test/kodak_0.0005_bpp0.0513_real #Tecnick_0.0005_0.0573_real #
      file_backend_cfg:
        target: diffbir.dataset.file_backend.HardDiskBackend
      out_size: 512
      crop_type: none #center
      random_flag: False
      Target_training: True
      Load_latent: False
      blur_kernel_size: 41
      kernel_list: [ 'iso', 'aniso' ]
      kernel_prob: [ 0.5, 0.5 ]
      blur_sigma: [ 0.1, 12 ]
      downsample_range: [ 1, 12 ]
      noise_range: [ 0, 15 ]
      jpeg_range: [ 30, 100 ]

batch_transform:
  target: diffbir.dataset.batch_transform.IdentityBatchTransform

